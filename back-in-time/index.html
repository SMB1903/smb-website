<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back in Time Band — Saint John, NB</title>
  <meta name="description" content="Back in Time Band — coming soon. Based in Saint John, New Brunswick.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C0182A;
      --gold-light: #D42030;
      --gold-dim: #8B0D1C;
      --black: #FFFFFF;
      --dark: #F8F4EE;
      --dark2: #F2EDE3;
      --cream: #3D0000;
      --cream-dim: #6B3333;
      --white: #2A0000;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── BAND SWITCHER ── */
    .band-switcher {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 101;
      background: #8B2020;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 0.75rem 2rem;
      font-family: 'Raleway', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .band-switcher a {
      color: rgba(245,237,214,0.75);
      text-decoration: none;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .band-switcher a:hover { color: #C9A84C; }
    .band-switcher a.active { color: #C9A84C; border-bottom-color: #C9A84C; }

    /* ── PLACEHOLDER ── */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 2rem 5rem;
      background: var(--dark2);
      border-bottom: 4px solid #C9A84C;
    }
    .placeholder-label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .placeholder-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 7vw, 6rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .placeholder p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--cream-dim);
      max-width: 500px;
      line-height: 1.8;
    }
    .divider-line {
      width: 60px;
      height: 2px;
      background: #C9A84C;
      margin: 2rem auto;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      text-align: center;
      padding: 2rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--cream-dim);
      text-transform: uppercase;
      border-top: 1px solid rgba(201,168,76,0.2);
    }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

<!-- BAND SWITCHER -->
<div class="band-switcher">
  <a href="/">Saint Mary's Band</a>
  <a href="/second-chance/">Port City Second Chance Band</a>
  <a href="/back-in-time/" class="active">Back in Time Band</a>
</div>

<!-- PLACEHOLDER -->
<div class="placeholder">
  <p class="placeholder-label">Coming Soon</p>
  <h1 class="placeholder-title">Back in Time<br>Band</h1>
  <div class="divider-line"></div>
  <p>More information coming soon. Stay tuned.</p>
</div>

<footer>
  <p>Back in Time Band · Saint John, NB · Part of <a href="/">Saint Mary's Band</a></p>
</footer>

</body>
</html>
